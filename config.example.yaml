# hypercore-power-manager configuration
# Copy to /etc/hypercore-power-manager/config.yaml and edit for your environment.

# --- NUT (Network UPS Tools) connection ---
# Use an IP address for the NUT server — your DNS provider may lose power
# before the UPS is exhausted.
nut:
    host: "192.168.1.20" # IP of your NUT server
    port: 3493 # Default NUT port (optional, default: 3493)
    ups_name: "ups" # UPS name as configured in ups.conf (optional, default: "ups")
    poll_interval_seconds: 5 # Seconds between UPS polls (optional, default: 5)

# --- HyperCore clusters ---
# Each cluster has one HyperCore API endpoint and one or more physical nodes.
# The daemon shuts down VMs via the API, then powers off each node via IPMI.
# Add as many clusters and nodes as needed.
#
# Use IP addresses instead of hostnames — your DNS server may lose power
# before the UPS is exhausted, making hostnames unresolvable.
clusters:
    # Multi-node cluster example
    - host: "https://192.168.1.100"
      username: "admin"
      password: "CHANGE_ME"
      vm_shutdown_timeout: 120 # Seconds to wait for VMs to stop (optional, default: 120)
      nodes:
          - ipmi_host: "192.168.1.10"
            ipmi_username: "root"
            ipmi_password: "CHANGE_ME"
          - ipmi_host: "192.168.1.11"
            ipmi_username: "root"
            ipmi_password: "CHANGE_ME"
          - ipmi_host: "192.168.1.12"
            ipmi_username: "root"
            ipmi_password: "CHANGE_ME"

    # Single-node cluster example
    - host: "https://192.168.1.101"
      username: "admin"
      password: "CHANGE_ME"
      nodes:
          - ipmi_host: "192.168.1.13"
            ipmi_username: "root"
            ipmi_password: "CHANGE_ME"

# --- Shutdown thresholds ---
# While on battery, the daemon triggers VM shutdown when EITHER threshold is
# breached. Both values are UPS firmware estimates and share the same
# underlying uncertainty — the aggressive defaults are intentional.
thresholds:
    battery_percent:
        80 # Trigger below this charge level (optional, default: 80)
        # Conservative — UPS charge estimates can be unreliable.
    runtime_seconds:
        600 # Trigger below this runtime estimate in seconds (optional, default: 600)
        # Catches undersized-UPS scenarios that battery_percent alone misses,
        # since runtime factors in current load.
    host_shutdown_delay:
        60 # Seconds to wait after VMs stop before powering off hosts (optional, default: 60)
        # This is the abort window — if power returns during this delay,
        # hosts stay up and VMs restart immediately. Increase if your UPS
        # has plenty of capacity and you want a longer abort window.
    host_boot_timeout:
        600 # Max seconds to wait for HyperCore API after host power-on (optional, default: 600)
        # Depends on server POST time.
